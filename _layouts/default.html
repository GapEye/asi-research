<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="icon" href="{{ '/assets/img/seraph.svg' | relative_url }}" type="image/svg+xml">
  <link rel="icon" href="{{ '/assets/img/favicon-32.png' | relative_url }}" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="{{ '/assets/img/seraph-180.png' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  <canvas id="neural-bg" aria-hidden="true"></canvas>

  <header class="site-header">
    <div class="wrap header-row">
      <a class="wordmark" href="{{ '/' | relative_url }}">
        <svg class="mark" viewBox="0 0 64 64" width="22" height="22" aria-hidden="true" fill="currentColor">
          <g id="mw">
            <path d="M33.5 28 C34 19 39 9 48 4 C47.5 13 44 22 38.5 28.5 C36.5 29.5 34.5 29 33.5 28 Z"/>
            <path d="M32 41 C38.5 39 44.5 33.5 45.5 26.5 C39 27.5 33.5 31 31.2 35.5 C31 37.5 31.3 39.5 32 41 Z"/>
            <path d="M34.3 38 C40 42 44.5 48.5 45.5 57 C39.5 54.5 35.5 49.5 33.8 43.5 C33.7 41.5 33.9 39.5 34.3 38 Z"/>
          </g>
          <use href="#mw" transform="matrix(-1,0,0,1,64,0)"/>
          <path d="M30.6 33 L33.4 33 L34.2 58 L29.8 58 Z"/>
        </svg>
        ASI<span class="wordmark-dot">·</span>Research
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/writing/' | relative_url }}" {% if page.url contains '/writing' or page.layout == 'post' %}class="active"{% endif %}>Writing</a>
        <a href="{{ '/library/' | relative_url }}" {% if page.url contains '/library' or page.layout == 'paper' %}class="active"{% endif %}>Library</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>About</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-row">
      <span class="mono">asi-research.com</span>
      <span class="mono">est. 2026 · <a href="{{ '/feed.xml' | relative_url }}">RSS</a></span>
    </div>
  </footer>

  <script src="{{ '/assets/js/neural-bg.js' | relative_url }}" defer></script>
</body>
</html>
