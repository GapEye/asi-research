---
layout: default
---
<article class="entry">
  <header class="entry-header">
    <div class="meta-line mono">
      {% if page.catalog_id %}<span class="catalog-id">{{ page.catalog_id }}</span>{% endif %}
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d %b %Y" }}</time>
      <span class="track track-essay">essay</span>
    </div>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="entry-body">
    {{ content }}
  </div>
</article>
