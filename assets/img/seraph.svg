<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    path { fill: #16181d; }
    @media (prefers-color-scheme: dark) { path { fill: #f5f5f2; } }
  </style>
  <g id="r">
    <!-- raised wing (V) -->
    <path d="M33.5 28 C34 19 39 9 48 4 C47.5 13 44 22 38.5 28.5 C36.5 29.5 34.5 29 33.5 28 Z"/>
    <!-- wrapped wing, covering the face, tip meeting at center -->
